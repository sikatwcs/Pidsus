<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Pemulihan Aset - Kejaksaan Negeri Manggarai Barat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --kejaksaan-green: #0a6b32; /* Hijau Khas Kejaksaan */
            --kejaksaan-gold: #b38f00;
            --primary-dark: #1a252f;
            --accent-red: #d32f2f;
            --accent-orange: #f57c00;
            --accent-blue: #1976d2;
            --bg-light: #f4f6f9;
            --text-dark: #333;
            --text-light: #fff;
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-light);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            color: var(--text-dark);
        }

        /* --- HEADER --- */
        header {
            background-color: var(--primary-dark);
            color: var(--text-light);
            padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 4px solid var(--kejaksaan-gold);
            z-index: 1000; box-shadow: var(--shadow-md);
        }

        header .title-group { display: flex; align-items: center; gap: 15px; }
        header img { height: 50px; } /* Placeholder Logo */
        header h1 { margin: 0; font-size: 1.4em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        header h2 { margin: 0; font-size: 1.1em; font-weight: 400; color: #bdc3c7; }

        /* --- SUMMARY STATS --- */
        .stats-container { display: flex; gap: 10px; }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 5px 15px; border-radius: 8px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-val { font-size: 1.3em; font-weight: 700; color: var(--kejaksaan-gold); }
        .stat-label { font-size: 0.7em; text-transform: uppercase; color: #ccc; }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-wrapper {
            display: flex; flex: 1; min-height: 0; /* Important for flex scrolling */
        }

        #map { flex: 2; height: 100%; z-index: 1; }

        /* --- SIDEBAR --- */
        #sidebar {
            flex: 1; max-width: 420px; min-width: 320px;
            background: #fff; display: flex; flex-direction: column;
            border-left: 1px solid #ddd; z-index: 2; box-shadow: -2px 0 10px rgba(0,0,0,0.05);
        }

        .search-area {
            padding: 15px; background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 10;
        }
        .search-area input {
            width: 100%; padding: 12px;
            border-radius: 25px; border: 1px solid #ccc;
            font-size: 1em; background-color: #fafafa;
            transition: all 0.2s; box-sizing: border-box;
        }
        .search-area input:focus {
            border-color: var(--kejaksaan-green);
            background-color: #fff; outline: none;
            box-shadow: 0 0 0 3px rgba(10, 107, 50, 0.15);
        }

        /* --- TARGET LIST --- */
        #targetList {
            list-style: none; padding: 10px; margin: 0;
            overflow-y: auto; flex: 1; /* Scrollable area */
            background-color: #f9f9f9;
        }

        .target-card {
            background: #fff; border-radius: 10px;
            padding: 15px; margin-bottom: 10px;
            cursor: pointer; border: 1px solid #eee;
            transition: all 0.2s ease;
            position: relative; overflow: hidden;
        }
        .target-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-color: #ddd;
        }
        .target-card.active {
            border-color: var(--kejaksaan-green);
            background-color: rgba(10, 107, 50, 0.03);
            border-left: 5px solid var(--kejaksaan-green);
        }

        /* Priority Indicator Stripe */
        .priority-stripe {
            position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
        }

        .card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
        .target-name { font-weight: 700; font-size: 1.1em; color: var(--primary-dark); }
        
        .card-body { font-size: 0.9em; color: #555; line-height: 1.4; }
        .info-row { margin-bottom: 4px; display: flex; gap: 5px; }
        .info-label { font-weight: 500; color: #7f8c8d; min-width: 35px; }

        .badge {
            display: inline-block; padding: 4px 10px;
            border-radius: 15px; font-size: 0.7em; font-weight: 700;
            color: white; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 8px; padding: 5px; }
        .leaflet-popup-content b { font-size: 1.1em; color: var(--primary-dark); }
        .popup-address { font-size: 0.9em; color: #666; margin-top: 5px; }
        .popup-nik { font-size: 0.9em; font-weight: bold; margin-top: 5px; color: var(--kejaksaan-green); }

        /* Responsive */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column-reverse; }
            #sidebar { max-width: 100%; width: 100%; height: 40vh; border-left: none; border-top: 2px solid #ccc; }
            #map { height: 60vh; flex: none; }
            header h1 { font-size: 1.1em; }
            header h2 { font-size: 0.9em; }
            .stats-container { display: none; } /* Hide stats on mobile header */
        }
    </style>
</head>
<body>

    <header>
        <div class="title-group">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Logo_Kejaksaan_Republik_Indonesia.png" alt="Logo Kejaksaan">
            <div>
                <h1>Pidsus Manggarai Barat</h1>
                <h2>Dasbor Pemulihan Aset</h2>
            </div>
        </div>
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-val" id="totalTargets">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box" style="border-color: var(--accent-red);">
                <div class="stat-val" style="color: var(--accent-red);" id="ring1Targets">0</div>
                <div class="stat-label">Ring 1</div>
            </div>
        </div>
    </header>
    
    <div class="main-wrapper">
        <div id="map"></div>
        
        <div id="sidebar">
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="Cari nama, NIK, atau kecamatan..." onkeyup="filterList()">
            </div>
            <ul id="targetList">
                </ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // --- KONFIGURASI PETA ---
        var map = L.map('map', {
            zoomControl: false // Kita pindahkan posisi zoom nanti
        }).setView([-8.4964, 119.8877], 11); // Fokus ke Labuan Bajo

        L.control.zoom({ position: 'bottomleft' }).addTo(map); // Zoom di kiri bawah agar tak tertutup sidebar mobile

        // Base Map: OpenStreetMap (Standard Street Map)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- DATA TARGET (SAMA SEPERTI SEBELUMNYA) ---
        var dataTarget = [
            { nama: "Abdullah Nur", alamat: "Lingkungan I RT.003/RW.002, Kel. Labuan Bajo, Kec. Komodo", nik: "531505311266001", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Afrizal alias Unyil", alamat: "Kampung Ujung RT.004/RW.002, Kel. Labuan Bajo, Kec. Komodo", nik: "-", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Ambrosius Sukur", alamat: "Gang Pengadilan RT.14/RW.15, Kel. Gorontalo, Kec. Komodo", nik: "5315052207670002", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Dai Kayus", alamat: "Kampung Ujung RT.004/RW.002, Kel. Labuan Bajo, Kec. Komodo", nik: "315050107550135", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Ente Puasa", alamat: "Kampung Ujung, Kel. Labuan Bajo, Kec. Komodo", nik: "5315050102280001", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Fransiskus Carlo Manggut", alamat: "Kaper RT.009/RW.004, Desa Golo Bilas, Kec. Komodo", nik: "5315050602861001", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Haji Sukri", alamat: "Pulau Papagarang RT.004/RW.002, Desa Papagarang, Kec. Komodo", nik: "5315050203430001", baseLat: -8.5500, baseLon: 119.7800, color: "red", kat: "Ring 1 (Kepulauan)" },
            { nama: "Mahmud Nip", alamat: "Gorontalo RT.012/RW.004, Desa Gorontalo, Kec. Komodo", nik: "5315051202780002", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Ramling", alamat: "Sernaru RT.004/RW.002, Kel. Wae Kelambu, Kec. Komodo", nik: "5315053112750007", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Supardi Tahiya", alamat: "Kampung Ujung RT.002/RW.001, Kel. Labuan Bajo, Kec. Komodo", nik: "5315052712710001", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Veronika Syukur", alamat: "Cowang Dereng RT.007/RW.002, Kel. Batu Cermin, Kec. Komodo", nik: "5315056910680001", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Yustinus Terang", alamat: "Jalan Pantai Pede RT.005/RW.003, Kel. Gorontalo, Kec. Komodo", nik: "53150525504770007", baseLat: -8.4964, baseLon: 119.8877, color: "red", kat: "Ring 1" },
            { nama: "Aloysius Nasus", alamat: "Kaung RT.001/RW.002, Kel. Golo Lujang, Kec. Boleng", nik: "5315060107670053", baseLat: -8.4167, baseLon: 120.0000, color: "orange", kat: "Ring 2" },
            { nama: "Emilianus Susanto", alamat: "Lesem RT.003/RW.001, Desa Golo Lujang, Kec. Boleng", nik: "5315061807910003", baseLat: -8.4167, baseLon: 120.0000, color: "orange", kat: "Ring 2" },
            { nama: "Kristoforus Onal", alamat: "Ngaet RT.002/RW.001, Kel. Golo Lujang, Kec. Boleng", nik: "-", baseLat: -8.4167, baseLon: 120.0000, color: "orange", kat: "Ring 2" },
            { nama: "Candu Mohamad Tahir", alamat: "Nangalili RT.013/RW.007, Desa Nangalili, Kec. Lembor Selatan", nik: "-", baseLat: -8.7000, baseLon: 120.1167, color: "orange", kat: "Ring 2" },
            { nama: "Dzulfikarno Canhir, S.Ip", alamat: "Desa Nangalili RT.013/RW.007, Kec. Lembor Selatan", nik: "-", baseLat: -8.7000, baseLon: 120.1167, color: "orange", kat: "Ring 2" },
            { nama: "Avensius Galus, S.E.", alamat: "Lale RT.001/RW.001, Desa Lale, Kec. Welak", nik: "5315071106830001", baseLat: -8.5667, baseLon: 120.0667, color: "orange", kat: "Ring 2" },
            { nama: "Ferdinandus Jegambut", alamat: "Bola RT.004/RW.002, Desa Welak, Kec. Welak", nik: "5315072710860002", baseLat: -8.5667, baseLon: 120.0667, color: "orange", kat: "Ring 2" },
            { nama: "Abdul Kader", alamat: "Nangakantor, Desa Nangakantor Barat, Kec. Mancang Pacar", nik: "-", baseLat: -8.3167, baseLon: 120.1500, color: "orange", kat: "Ring 2" },
            { nama: "Petrus Danggut", alamat: "Bilas RT.003/RW.001, Kel. Pau, Kec. Langke Rembong", nik: "5310120507690003", baseLat: -8.6111, baseLon: 120.4667, color: "orange", kat: "Ring 2" },
            { nama: "Marthen Ndeo", alamat: "Kelurahan Sikumana RT.025/RW.010, Kota Kupang", nik: "53710424085900004", baseLat: -10.1772, baseLon: 123.6070, color: "blue", kat: "Ring 3" },
            { nama: "I Putu Suta Suyasa, S.T.", alamat: "Banjar Belah, Desa Luwus, Kec. Baturiti, Kab. Tabanan", nik: "-", baseLat: -8.4495, baseLon: 115.0615, color: "blue", kat: "Ring 3" },
            { nama: "Ary Andi Masbah", alamat: "Jl. Baronang III, Kel. Kalumeme, Kec. Ujung Bulu, Kab. Bulukumba", nik: "7302022206780002", baseLat: -5.5577, baseLon: 120.1873, color: "blue", kat: "Ring 3" },
            { nama: "Muhammad Achyar", alamat: "Perumahan Sakura Regency 2, Bojong Kulur, Bogor", nik: "-", baseLat: -6.5971, baseLon: 106.7900, color: "blue", kat: "Ring 3" },
            { nama: "Hamdani", alamat: "Jl. Sandi Hasan No.99, Tanjung Senang, Bandar Lampung", nik: "1871110401740002", baseLat: -5.4500, baseLon: 105.2667, color: "blue", kat: "Ring 3" },
            { nama: "Sunarto, S.E.", alamat: "Jl. P. Tirtayasa Perum Wijaya III, Sukabumi Indah, Bandar Lampung", nik: "-", baseLat: -5.4500, baseLon: 105.2667, color: "blue", kat: "Ring 3" },
            { nama: "Yudi Hermawan, A.Md.", alamat: "Jln. Sultan Badarrudin 2, Susunan Baru, Bandar Lampung", nik: "-", baseLat: -5.4500, baseLon: 105.2667, color: "blue", kat: "Ring 3" }
        ];

        // --- INISIALISASI DASBOR ---
        var listContainer = document.getElementById('targetList');
        var cardObjects = [];
        var ring1Count = 0;

        // Hitung Statistik Awal
        document.getElementById('totalTargets').innerText = dataTarget.length;

        dataTarget.forEach(function(item, index) {
            // 1. Koordinat dengan Offset Acak (Agar Pin Tidak Menumpuk)
            var lat = item.baseLat + (Math.random() - 0.5) * 0.012;
            var lon = item.baseLon + (Math.random() - 0.5) * 0.012;

            // 2. Tentukan Warna & Statistik
            var colorMap = {
                'red': { hex: '#d32f2f', label: 'Ring 1 (Prioritas)' },
                'orange': { hex: '#f57c00', label: 'Ring 2 (Sedang)' },
                'blue': { hex: '#1976d2', label: 'Ring 3 (Luar Wilayah)' }
            };
            var config = colorMap[item.color];
            if(item.color === 'red') ring1Count++;

            // 3. Tambahkan Marker (Pin) ke Peta
            var marker = L.circleMarker([lat, lon], {
                color: '#fff', weight: 2, fillColor: config.hex, fillOpacity: 0.9, radius: 9, elevation: 5
            }).addTo(map);

            // Popup Marker
            var popupContent = `
                <b>${item.nama}</b>
                <div class="popup-address">${item.alamat}</div>
                <div class="popup-nik">NIK: ${item.nik}</div>
            `;
            marker.bindPopup(popupContent);

            // 4. Buat Desain Card untuk Daftar Sidebar
            var li = document.createElement('li');
            li.className = 'target-card';
            li.id = 'target-' + index;
            li.innerHTML = `
                <div class="priority-stripe" style="background-color: ${config.hex};"></div>
                <div class="card-header">
                    <div class="target-name">${item.nama}</div>
                    <span class="badge" style="background-color: ${config.hex};">${item.kat}</span>
                </div>
                <div class="card-body">
                    <div class="info-row"><span class="info-label">NIK:</span> <span>${item.nik}</span></div>
                    <div class="info-row"><span class="info-label">Alat:</span> <span>${item.alamat}</span></div>
                </div>
            `;
            
            // 5. Event Klik Card: Zoom Peta & Highlight Card
            li.onclick = function() {
                // Zoom & Arahkan Peta
                map.setView([lat, lon], 17, { animate: true, duration: 1 }); 
                marker.openPopup();

                // Highlight Card yang aktif
                document.querySelectorAll('.target-card').forEach(c => c.classList.remove('active'));
                li.classList.add('active');
            };

            listContainer.appendChild(li);

            // Simpan referensi untuk fitur pencarian
            cardObjects.push({ id: index, marker: marker, li: li, data: item });
        });

        // Update Counter Ring 1 di Header
        document.getElementById('ring1Targets').innerText = ring1Count;

        // --- FITUR PENCARIAN & FILTER ---
        function filterList() {
            var input = document.getElementById('searchInput').value.toLowerCase();
            
            cardObjects.forEach(function(obj) {
                var text = (obj.data.nama + obj.data.alamat + obj.data.nik).toLowerCase();
                if (text.includes(input)) {
                    obj.li.style.display = ""; // Tampilkan card
                    obj.marker.addTo(map);      // Tampilkan pin
                } else {
                    obj.li.style.display = "none"; // Sembunyikan card
                    map.removeLayer(obj.marker);    // Sembunyikan pin
                }
            });
        }
    </script>
</body>
</html>
