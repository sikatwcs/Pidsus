    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map { width: 70%; height: 100%; }
        #sidebar { width: 30%; height: 100%; background: #f8f9fa; overflow-y: auto; display: flex; flex-direction: column; border-left: 2px solid #ccc; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .search-container { padding: 15px; background: #ecf0f1; border-bottom: 1px solid #bdc3c7; }
        #searchInput { width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .list-group { list-style: none; padding: 0; margin: 0; }
        .list-item { padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; transition: background 0.2s; }
        .list-item:hover { background: #e0e0e0; }
        .item-name { font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .item-address { font-size: 0.85em; color: #555; margin-top: 5px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75em; color: white; margin-top: 8px; }
        .badge.red { background: #e74c3c; }
        .badge.orange { background: #e67e22; }
        .badge.blue { background: #3498db; }
    </style>
</head>

            <p style="font-size: 0.8em; margin:0;">Klik nama untuk melihat di peta</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Cari nama atau alamat..." onkeyup="filterList()">
        </div>
        <ul class="list-group" id="targetList">
            </ul>
    </div>

            { nama: "Kristoforus Onal", alamat: "Ngaet RT.002/RW.001, Kel. Golo Lujang, Kec. Boleng", nik: "-", baseLat: -8.4167, baseLon: 120.0000, color: "orange", kat: "Ring 2" },
            { nama: "Candu Mohamad Tahir", alamat: "Nangalili RT.013/RW.007, Desa Nangalili, Kec. Lembor Selatan", nik: "-", baseLat: -8.7000, baseLon: 120.1167, color: "orange", kat: "Ring 2" },

            { nama: "Yudi Hermawan, A.Md.", alamat: "Jln. Sultan Badarrudin 2, Susunan Baru, Bandar Lampung", nik: "-", baseLat: -5.4500, baseLon: 105.2667, color: "blue", kat: "Ring 3 (Lampung)" }
        ];

        var markers = [];
        var listContainer = document.getElementById('targetList');

        dataTarget.forEach(function(item, index) {
            // Beri offset acak sangat kecil agar marker di wilayah sama tidak saling tumpuk 100%
            var lat = item.baseLat + (Math.random() - 0.5) * 0.015;
            var lon = item.baseLon + (Math.random() - 0.5) * 0.015;

            var markerColor = item.color === 'red' ? '#e74c3c' : item.color === 'orange' ? '#e67e22' : '#3498db';

            var marker = L.circleMarker([lat, lon], {
                color: 'black', weight: 1, fillColor: markerColor, fillOpacity: 0.9, radius: 8
            }).addTo(map);

            var popupContent = `<b>${item.nama}</b><br><small>${item.alamat}</small><br><b>NIK:</b> ${item.nik}`;
            marker.bindPopup(popupContent);
            markers.push({ id: index, marker: marker, data: item });

            // Buat List HTML
            var li = document.createElement('li');
            li.className = 'list-item';
            li.id = 'item-' + index;
            li.innerHTML = `
                <div class="item-name">${item.nama}</div>
                <div class="item-address">${item.alamat}</div>
                <span class="badge ${item.color}">${item.kat}</span>
            `;
            
            // Event klik pada list untuk zoom ke map
            li.onclick = function() {
                map.setView([lat, lon], 16); // Zoom level 16
                marker.openPopup();
            };
            listContainer.appendChild(li);
        });

        // Fitur Pencarian
        function filterList() {
            var input = document.getElementById('searchInput').value.toLowerCase();
            var items = listContainer.getElementsByClassName('list-item');
            
            for (var i = 0; i < items.length; i++) {
                var text = items[i].innerText.toLowerCase();
                if (text.includes(input)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
